<!DOCTYPE html>
<html lang="id">
<head>
  <meta property="og:title" content="Undangan Pernikahan Hendri & Rahima">
<meta property="og:description" content="Kami mengundang Anda untuk hadir di hari bahagia kami.">
<meta property="og:image" content="https://comic16.github.io/Undangan/cover.png">
<meta property="og:url" content="https://comic16.github.io/Undangan/">
<meta property="og:type" content="website">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Hendri & Rahima</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

body.lock {
  overflow: hidden;
}

.section {
  width: 100%;
  height: 100vh;
  position: relative;
  transition: all 0.8s ease;
}

img.bg {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.btn {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 25px;
  background: #e91e63;
  color: white;
  border-radius: 30px;
  border: none;
  font-size: 16px;
}

/* ✨ TRANSISI PREMIUM */
.zoom-out {
  transform: scale(1.3);
  filter: blur(10px);
  opacity: 0;
}

/* FLASH */
#flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0;
  z-index: 9999;
  pointer-events: none;
}

.flash-show {
  animation: flashAnim 0.8s ease;
}

@keyframes flashAnim {
  0% {opacity: 0;}
  30% {opacity: 1;}
  100% {opacity: 0;}
}

/* LOVE */
.love {
  position: absolute;
  bottom:10%;
  font-size: 20px;
  animation: loveUp 3s ease-out forwards;
  z-index: 9999;
}

@keyframes loveUp {
  0% {transform: translateY(0) scale(1); opacity:1;}
  100% {transform: translateY(-400px) scale(1.8); opacity:0;}
}

/* COUNTDOWN */
#countdown {
  position: absolute;
  bottom: 55%;
  width: 100%;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

/* NOTIF */
#notif {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  display: none;
}

/* HILANGKAN HALAMAN 1 */
.hide-first {
  display: none;
}
</style>
</head>

<body class="lock">

<audio id="music" loop>
  <source src="musik.mp3" type="audio/mp3">
</audio>

<div id="flash"></div>

<!-- HALAMAN 1 -->
<div class="section" id="halaman1">
  <img src="1.png" class="bg">
  <button class="btn" style="bottom:18%;" onclick="openInvite()">Buka Undangan</button>
</div>

<!-- HALAMAN 2 -->
<div class="section">
  <img src="2.png" class="bg">
  <div id="namaTamu" style="position:absolute;bottom:20%;width:100%;text-align:center;font-weight:bold;"></div>
</div>

<!-- HALAMAN 3 -->
<div class="section">
  <img src="3.png" class="bg">
  <button class="btn" style="bottom:5%;" onclick="loveEffect()">❤️ Klik Love</button>
</div>

<!-- HALAMAN 4 -->
<div class="section">
  <img src="4.png" class="bg">
  <div id="countdown"></div>
  <button class="btn" style="bottom:2%;" onclick="openMap()">Buka Lokasi</button>
</div>

<!-- HALAMAN 5 -->
<div class="section">
  <img src="5.png" class="bg">

  <button class="btn" style="bottom:53%; left:5%; transform:none;" onclick="copyRek('081998155294')">
    Salin DANA
  </button>

  <button class="btn" style="bottom:18%; left:5%; transform:none;" onclick="copyRek('106820583551')">
    Salin JAGO
  </button>
</div>

<!-- HALAMAN 6 -->
<div class="section">
  <img src="6.png" class="bg">

  <div style="position:absolute;top:20%;width:100%;text-align:center;">
    <input id="namaUcapan" placeholder="Nama"
      style="width:80%;padding:10px;margin:5px;border-radius:10px;border:none;"><br>

    <textarea id="pesanUcapan" placeholder="Ucapan & doa"
      style="width:80%;padding:10px;margin:5px;border-radius:10px;border:none;height:80px;"></textarea><br>

    <button class="btn" onclick="kirimUcapan()">Kirim</button>
  </div>

  <div id="listUcapan" style="
    position:absolute;
    bottom:5%;
    width:100%;
    max-height:40%;
    overflow:auto;
    padding:10px;">
  </div>
</div>

<div id="notif"></div>

<script>

document.addEventListener("DOMContentLoaded", function(){

  /* OPEN INVITE */
  window.openInvite = function(){
    let halaman1 = document.getElementById("halaman1");
    let flash = document.getElementById("flash");

    halaman1.classList.add("zoom-out");
    flash.classList.add("flash-show");

    let music = document.getElementById("music");
    music.volume = 0;
    music.play().catch(()=>{});

    let vol = 0;
    let fade = setInterval(()=>{
      if(vol < 1){
        vol += 0.05;
        music.volume = vol;
      } else clearInterval(fade);
    },200);

    setTimeout(()=>{
      document.body.classList.remove("lock");
      halaman1.classList.add("hide-first");
      window.scrollTo(0,0);
    },800);
  };

  /* NAMA TAMU */
  const urlParams = new URLSearchParams(window.location.search);
  const nama = urlParams.get('to') || "Para Undangan";

  let targetNama = document.getElementById("namaTamu");
  if(targetNama){
    targetNama.innerText = nama;
  }

});

/* LOVE EFFECT */
function loveEffect(){
  const section = document.querySelectorAll('.section')[2];

  for(let i=0;i<15;i++){
    setTimeout(()=>{
      let love = document.createElement("div");
      love.className="love";

      const icons = ["❤️","💖","💘","💝"];
      love.innerHTML = icons[Math.floor(Math.random()*icons.length)];

      love.style.left = (45 + Math.random()*10)+"%";

      section.appendChild(love);

      setTimeout(()=>love.remove(),3000);
    }, i*120);
  }
}

/* COUNTDOWN */
const target = new Date("April 11, 2026 08:00:00").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const jarak = target - now;

  const d = Math.floor(jarak/(1000*60*60*24));
  const h = Math.floor((jarak%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((jarak%(1000*60*60))/(1000*60));
  const s = Math.floor((jarak%(1000*60))/1000);

  document.getElementById("countdown").innerHTML =
  d+" Hari "+h+" Jam "+m+" Menit "+s+" Detik";
},1000);

/* MAP */
function openMap(){
  window.open("https://maps.app.goo.gl/hPbYL5FsRjt7p9HGA");
}

/* COPY REK */
function copyRek(no){
  navigator.clipboard.writeText(no);

  let notif = document.getElementById("notif");
  notif.innerText = "Berhasil disalin: "+no;
  notif.style.display="block";

  setTimeout(()=>notif.style.display="none",2000);
}

/* UCAPAN */
function kirimUcapan(){
  let nama = document.getElementById("namaUcapan").value;
  let pesan = document.getElementById("pesanUcapan").value;

  if(!nama || !pesan){
    alert("Isi dulu ya");
    return;
  }

  let data = JSON.parse(localStorage.getItem("ucapan")) || [];
  data.push({nama,pesan});
  localStorage.setItem("ucapan", JSON.stringify(data));

  tampilUcapan();

  document.getElementById("namaUcapan").value="";
  document.getElementById("pesanUcapan").value="";
}

function tampilUcapan(){
  let data = JSON.parse(localStorage.getItem("ucapan")) || [];
  let html="";

  data.reverse().forEach(d=>{
    html += `<div style="background:#fff;padding:10px;margin:5px;border-radius:10px;">
      <b>${d.nama}</b><br>${d.pesan}
    </div>`;
  });

  document.getElementById("listUcapan").innerHTML = html;
}

tampilUcapan();

</script>

</body>
</html>
