<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="Undangan Pernikahan Hendri & Rahima">
<meta property="og:description" content="Kami mengundang Anda untuk hadir di hari bahagia kami.">
<meta property="og:image" content="https://comic16.github.io/Undangan/cover.jpg">
<meta property="og:url" content="https://comic16.github.io/Undangan/">
<meta property="og:type" content="website">

<title>Undangan Hendri & Rahima</title>

<style>
 html {
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
}

body {
  margin: 0;
  padding: 0;
  overflow-y: scroll;
  overflow-x: hidden;
}

/* LOVE */
.love {
  position: absolute;
  bottom:10%;
  font-size: 20px;
  animation: loveUp 3s ease-out forwards;
  z-index: 9999;
}

@keyframes loveUp {
  0% {transform: translateY(0) scale(1); opacity:1;}
  100% {transform: translateY(-400px) scale(1.8); opacity:0;}
}

#musicBtn:hover {
  transform: scale(1.1);
}
body { margin:0; font-family:sans-serif; }
body.lock {
  overflow: hidden;
  height: 100vh;
  touch-action: none;
}

.section {
  width: 100%;
  max-width: 100%;
  height: 100vh;
  position: relative;
  overflow: hidden; /* 🔥 penting */
}
.section {
  scroll-snap-align: start;
  scroll-snap-stop: always;
}
img.bg {
  width: 100%;
  height: 100%;
  object-fit: cover; /* 🔥 ini bikin stabil */
  display: block;
}

.btn {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  padding:12px 25px;
  background:#e91e63;
  color:white;
  border-radius:30px;
  border:none;
  font-size:16px;
  z-index:10;
}

.zoom-out {
  transform:scale(1.3);
  opacity:0;
}

#flash {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:white;
  opacity:0;
  z-index:-1;
}

.flash-show { animation:flash 0.8s; }

@keyframes flash {
  0%{opacity:0;}
  30%{opacity:1;}
  100%{opacity:0;}
}

#countdown {
  position: absolute;
  bottom: 52%;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
}

/* kotak */
.cd-box {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);

  padding: 10px 12px;
  border-radius: 12px;
  text-align: center;

  min-width: 60px;
  color: white;

  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* angka */
.cd-box {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);

  padding: 10px 14px;
  border-radius: 12px;

  display: flex;              /* 🔥 ini kunci */
  align-items: center;
  gap: 6px;                   /* jarak angka & teks */

  color: black;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* angka */
.cd-box span {
  font-size: 20px;
  font-weight: bold;
}

/* label */
.cd-box small {
  font-size: 13px;
  opacity: 0.9;
}

#notif {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:10px;
  border-radius:20px;
  display:none;
}
#musicBtn {
  position: fixed;
  top: 15px;
  right: 15px;
  z-index: 999999;

  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;

  background: rgba(233, 30, 99, 0.95);
  color: white;
  font-size: 20px;

  cursor: pointer;

  /* 🔥 KUNCI UTAMA */
  transform: translate3d(0,0,0) !important;
  transition: none !important;

  /* 🔥 ANTI GOYANG */
  will-change: transform;
  backface-visibility: hidden;

  /* 🔥 LOCK POSITION */
  left: auto;
  bottom: auto;
}
.ucapan-item {
  background: rgba(255, 255, 255, 0.15); /* transparan */
  backdrop-filter: blur(8px); /* efek kaca (opsional tapi keren) */
  -webkit-backdrop-filter: blur(8px);

  margin: 6px 0;
  padding: 10px 12px;

  border-radius: 12px;
  color: #fff;

  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  font-size: 14px;
}
#toast {
  position: fixed;
  top: 20px; /* 🔥 dari atas */
  left: 50%;
  transform: translateX(-50%) translateY(-100px);

  background: rgba(0,0,0,0.85);
  color: white;
  padding: 12px 20px;
  border-radius: 20px;

  font-size: 14px;
  opacity: 0;
  transition: all 0.4s ease;

  z-index: 999999;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body class="lock">

<audio id="music" loop>
  <source src="musik.mp3" type="audio/mp3">
</audio>

<!-- ✅ TARUH DI LUAR -->
<button id="musicBtn">▶</button>

<div id="flash"></div>

<!-- HALAMAN 1 -->
<div class="section" id="halaman1">
<img src="1.jpg" class="bg">
<button class="btn" style="bottom:18%;" onclick="openInvite()">Buka Undangan</button>
</div>

<!-- HALAMAN 2 -->
<div class="section">
<img src="2.jpg" class="bg">
<div id="namaTamu" style="position:absolute;bottom:17%;width:100%;text-align:center;font-weight:bold;"></div>
</div>

<!-- HALAMAN 3 -->
<div class="section">
<img src="3.jpg" class="bg">
 <button class="btn" style="bottom:5%;" onclick="loveEffect()">❤️ Klik Love</button>
</div>

<!-- HALAMAN 4 -->
<div class="section">
<img src="4.jpg" class="bg">
<div id="countdown">
  <div class="cd-box">
    <span id="hari">0</span>
    <small>Hari</small>
  </div>
  <div class="cd-box">
    <span id="jam">0</span>
    <small>Jam</small>
  </div>
  <div class="cd-box">
    <span id="menit">0</span>
    <small>Menit</small>
  </div>
</div>
<button class="btn" style="bottom:1%;" onclick="openMap()">Buka Lokasi</button>
</div>

<!-- HALAMAN 5 -->
<div class="section">
<img src="5.jpg" class="bg">
<button class="btn" style="bottom:55%;left:5%;transform:none;" onclick="copyRek('081998155294')">Salin DANA</button>
<button class="btn" style="bottom:18%;left:5%;transform:none;" onclick="copyRek('106820583551')">Salin JAGO</button>
</div>

<!-- HALAMAN 6 -->
<div class="section" style="display:flex;flex-direction:column;">
<img src="6.jpg" class="bg" style="position:absolute;z-index:-1;">

<div style="padding-top:30%;text-align:center;">
  <input id="namaUcapan" placeholder="Nama" style="width:80%;padding:10px;margin:5px;border-radius:10px;"><br>
  <textarea id="pesanUcapan" placeholder="Ucapan & doa" style="width:80%;padding:10px;margin:5px;border-radius:10px;height:80px;"></textarea><br>
  <button class="btn" onclick="kirimUcapan()">Kirim</button>
</div>

<div id="listUcapan" style="
  flex:1;
  overflow:auto;
  padding:10px;
  margin-top:50px;
">
</div>
</div>

<script>
  let startY = 0;

window.addEventListener("touchstart", (e)=>{
  startY = e.touches[0].clientY;
});
  let isLocked = true;
  let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");
let isPlaying = false;

const API_URL = "https://script.google.com/macros/s/AKfycbwMkBhp_j6ihTThz1KN2LwTHCFyPzm9pRzO64rdjdcLW87-lWcq_IOiCysuf8trkYo3/exec";

/* OPEN */
function openInvite(){
  const halaman1 = document.getElementById("halaman1");

  halaman1.classList.add("zoom-out");
  document.getElementById("flash").classList.add("flash-show");

  music.play();
  btn.innerHTML="🎵";
  isPlaying = true;

  setTimeout(()=>{
    document.body.classList.remove("lock");

    // 🔥 scroll dulu ke halaman 2
    window.scrollTo({
      top: window.innerHeight,
      behavior: "instant"
    });

    // 🔥 baru hilangkan halaman 1
    halaman1.remove();

    isLocked = false;
  },800);
}

/* NAMA */
const urlParams = new URLSearchParams(window.location.search);
window.onload = function(){
  const urlParams = new URLSearchParams(window.location.search);
  document.getElementById("namaTamu").innerText =
    urlParams.get('to') || "Para Undangan";
};

/* LOVE EFFECT */
function loveEffect(){
  const section = document.querySelectorAll('.section')[1];

  for(let i=0;i<20;i++){
    setTimeout(()=>{
      let love = document.createElement("div");
      love.className = "love";

      const icons = ["❤️","💖","💘","💝"];
      love.innerHTML = icons[Math.floor(Math.random()*icons.length)];

      // 🔥 posisi lebih menyebar
      love.style.left = Math.random() * 100 + "%";

      // 🔥 ukuran random
      love.style.fontSize = (16 + Math.random()*20) + "px";

      // 🔥 durasi beda-beda
      love.style.animationDuration = (2 + Math.random()*2) + "s";

      section.appendChild(love);

      setTimeout(()=>love.remove(),4000);
    }, i*100);
  }
}//

btn.onclick = function(){
  if(isPlaying){
    music.pause();
    btn.innerHTML="▶";
  } else {
    music.play();
    btn.innerHTML="🎵";
  }
  isPlaying = !isPlaying;
};

/* COUNTDOWN */
const target = new Date("April 11, 2026 08:00:00").getTime();

setInterval(()=>{
  let now = new Date().getTime();
  let selisih = target - now;

  if(selisih <= 0){
    document.getElementById("countdown").innerHTML = "Acara dimulai 🎉";
    return;
  }

  let hari = Math.floor(selisih / (1000 * 60 * 60 * 24));
  let jam = Math.floor((selisih % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  let menit = Math.floor((selisih % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("hari").innerText = hari;
  document.getElementById("jam").innerText = jam;
  document.getElementById("menit").innerText = menit;
},1000);

/* COPY */
function copyRek(no){
  navigator.clipboard.writeText(no);
  let notif=document.getElementById("notif");
  notif.innerText="Disalin: "+no;
  notif.style.display="block";
  setTimeout(()=>notif.style.display="none",2000);
}

/* KIRIM */
function kirimUcapan(){
  const nama = document.getElementById("namaUcapan").value;
  const pesan = document.getElementById("pesanUcapan").value;

  if(!nama || !pesan){
    alert("Isi dulu!");
    return;
  }

  fetch(API_URL, {
    method: "POST",
    mode: "no-cors", // 🔥 INI KUNCI
    body: JSON.stringify({
      nama: nama,
      pesan: pesan
    })
  });

  // ⚠️ jangan pakai .then/.catch
 showToast("Ucapan terkirim ❤️");

  document.getElementById("namaUcapan").value="";
  document.getElementById("pesanUcapan").value="";

  setTimeout(loadUcapan,1000);
}

/* LOAD UCAPAN */
function loadUcapan(){
  fetch(API_URL + "?t=" + new Date().getTime()) // 🔥 anti cache
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById("listUcapan");
    list.innerHTML = "";

    data.reverse().forEach(d => {
      let div = document.createElement("div");
      div.className = "ucapan-item";
      div.innerHTML = "<b>"+d.nama+"</b><br>"+d.pesan;
      list.appendChild(div);
    });
  })
  .catch(err => {
    console.log("Gagal load ucapan:", err);
  });
}

/* AUTO LOAD */
setTimeout(loadUcapan,1000);
setInterval(loadUcapan, 2000); // 🔥 refresh tiap 5 detik


function showToast(text){  
  let toast = document.getElementById("toast");  
  toast.innerText = text;  
  
  toast.classList.add("show");  
  
  setTimeout(()=>{  
    toast.classList.remove("show");  
  },2000);  
}  
</script>  <div id="toast"></div>

<div id="toast"></div>
</body>
</html>
